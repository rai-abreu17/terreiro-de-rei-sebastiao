name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # .npmrc do repo já define legacy-peer-deps=true
      - name: Instalar dependências
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build de produção
        run: npm run build
